<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>Offline - Arsipkan</title>
    <style>
      :root {
        --bg: #020617;
        --surface: rgba(15, 23, 42, 0.92);
        --border: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #8b5cf6;
        --accent-soft: rgba(139, 92, 246, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(139, 92, 246, 0.18), transparent 24%),
          radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 28%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
      }

      .offline-card {
        width: min(100%, 520px);
        padding: 32px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.28);
      }

      .offline-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #c4b5fd;
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 12px;
        font-weight: 700;
        text-decoration: none;
        border: 1px solid transparent;
      }

      .button-primary {
        background: var(--accent);
        color: #fff;
      }

      .button-secondary {
        background: transparent;
        border-color: var(--border);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main class="offline-card">
      <div class="offline-badge">Mode Offline</div>
      <h1>Koneksi sedang tidak tersedia.</h1>
      <p>Beberapa aset statis Arsipkan tetap tersedia, tetapi halaman atau data terbaru membutuhkan koneksi internet. Coba sambungkan kembali lalu muat ulang halaman ini.</p>
      <div class="actions">
        <button class="button button-primary" type="button" onclick="window.location.reload()">Coba Lagi</button>
        <a class="button button-secondary" href="/">Kembali ke Beranda</a>
      </div>
    </main>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - ArsipKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --brand-primary: #6d28d9;
        --brand-primary-hover: #5b21b6;
        --bg-body: #f8fafc;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-body);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .login-card {
        max-width: 400px;
        width: 100%;
        background: white;
        border-radius: 24px;
        padding: 3rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
      }
      .logo-box {
        width: 56px;
        height: 56px;
        background: var(--brand-primary);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        margin: 0 auto 1.5rem;
      }
      .form-control {
        border-radius: 12px;
        padding: 0.8rem 1.2rem;
        border: 1px solid #e2e8f0;
      }
      .btn-login {
        background: var(--brand-primary);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 0.8rem;
        font-weight: 700;
        width: 100%;
        margin-top: 1.5rem;
        transition: all 0.2s;
      }
      .btn-login:hover {
        background: var(--brand-primary-hover);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="logo-box"><i data-lucide="file-up" style="width: 28px; height: 28px"></i></div>
      <h3 class="text-center fw-bold mb-1">Admin Login</h3>
      <p class="text-center text-muted small mb-4">Silakan masuk untuk mengelola arsip.</p>
      <form action="index.html">
        <div class="mb-3">
          <label class="form-label small fw-bold text-muted">Email Address</label>
          <input type="email" class="form-control" placeholder="admin@arsipku.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold text-muted">Password</label>
          <input type="password" class="form-control" placeholder="••••••••" required />
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="remember" />
            <label class="form-check-label small" for="remember">Ingat Saya</label>
          </div>
          <a href="#" class="small text-primary text-decoration-none fw-bold">Lupa Password?</a>
        </div>
        <button type="submit" class="btn-login">Masuk Sekarang</button>
      </form>
    </div>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>

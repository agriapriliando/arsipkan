<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Berkas - ArsipKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --brand-primary: #6d28d9;
        --brand-primary-hover: #5b21b6;
        --brand-light: #f5f3ff;
        --bg-body: #f8fafc;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-body);
        color: #1e293b;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .upload-container {
        max-width: 500px;
        width: 100%;
        background: white;
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
      }

      .logo-box {
        width: 48px;
        height: 48px;
        background: var(--brand-primary);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        margin: 0 auto 1.5rem;
      }

      .form-label {
        font-weight: 600;
        font-size: 0.875rem;
        color: #475569;
        margin-bottom: 0.5rem;
      }

      .form-control {
        border-radius: 12px;
        padding: 0.75rem 1rem;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        transition: all 0.2s;
      }

      .form-control:focus {
        background: white;
        border-color: var(--brand-primary);
        box-shadow: 0 0 0 4px var(--brand-light);
      }

      .drop-zone {
        border: 2px dashed #cbd5e1;
        border-radius: 16px;
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        background: #f8fafc;
        margin-top: 1rem;
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: var(--brand-primary);
        background: var(--brand-light);
      }

      .btn-upload {
        background: var(--brand-primary);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 0.875rem;
        font-weight: 700;
        width: 100%;
        margin-top: 2rem;
        transition: all 0.2s;
      }

      .btn-upload:hover {
        background: var(--brand-primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(109, 40, 217, 0.3);
      }

      .visibility-option {
        display: flex;
        gap: 1rem;
        margin-top: 0.5rem;
      }

      .vis-card {
        flex: 1;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 0.75rem;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }

      .vis-card input {
        display: none;
      }

      .vis-card:hover {
        border-color: var(--brand-primary);
      }

      .vis-card.active {
        background: var(--brand-light);
        border-color: var(--brand-primary);
        color: var(--brand-primary);
        font-weight: 600;
      }

      #fileInput {
        display: none;
      }

      .file-info {
        margin-top: 1rem;
        display: none;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
        background: #f1f5f9;
        border-radius: 10px;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="upload-container">
      <div class="logo-box">
        <i data-lucide="file-up"></i>
      </div>
      <h3 class="text-center fw-bold mb-1">Unggah Berkas</h3>
      <p class="text-center text-muted small mb-4">Silakan isi identitas dan pilih berkas Anda.</p>

      <form id="uploadForm">
        <div class="mb-3">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" class="form-control" placeholder="Masukkan nama Anda" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Nomor HP (WhatsApp)</label>
          <input type="tel" class="form-control" placeholder="Contoh: 08123456789" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Visibilitas Berkas</label>
          <div class="visibility-option">
            <label class="vis-card active" id="visPublic">
              <input type="radio" name="visibility" value="public" checked />
              <span>Publik</span>
            </label>
            <label class="vis-card" id="visPrivate">
              <input type="radio" name="visibility" value="private" />
              <span>Privat</span>
            </label>
          </div>
          <p class="text-muted mt-2" style="font-size: 0.75rem">*Berkas publik dapat dilihat dan diunduh oleh pengunjung lain.</p>
        </div>

        <div class="drop-zone" id="dropZone">
          <i data-lucide="cloud-upload" class="text-muted mb-2" style="width: 32px; height: 32px"></i>
          <p class="mb-0 text-muted small fw-medium">Klik atau seret file ke sini</p>
          <p class="text-muted" style="font-size: 0.7rem">Maksimal 10MB (PDF, JPG, PNG, DOCX)</p>
          <input type="file" id="fileInput" />
        </div>

        <div class="file-info" id="fileInfo">
          <i data-lucide="file" class="text-primary" style="width: 20px"></i>
          <span id="fileName" class="text-truncate flex-grow-1">nama-file.pdf</span>
          <button type="button" class="btn btn-sm p-0 text-danger" id="removeFile">
            <i data-lucide="x" style="width: 18px"></i>
          </button>
        </div>

        <button type="submit" class="btn-upload">Unggah Sekarang</button>
      </form>

      <p class="text-center mt-4 small text-muted">Sudah mengunggah? <a href="leaderboard.html" class="text-primary fw-bold text-decoration-none">Lihat Peringkat</a></p>
    </div>

    <script>
      lucide.createIcons();

      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const fileInfo = document.getElementById("fileInfo");
      const fileName = document.getElementById("fileName");
      const removeFile = document.getElementById("removeFile");
      const uploadForm = document.getElementById("uploadForm");

      // Visibility Toggle
      const visCards = document.querySelectorAll(".vis-card");
      visCards.forEach((card) => {
        card.addEventListener("click", () => {
          visCards.forEach((c) => c.classList.remove("active"));
          card.classList.add("active");
        });
      });

      // File Selection
      dropZone.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", handleFile);

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
      });

      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        if (e.dataTransfer.files.length) {
          fileInput.files = e.dataTransfer.files;
          handleFile();
        }
      });

      function handleFile() {
        if (fileInput.files.length) {
          fileName.textContent = fileInput.files[0].name;
          fileInfo.style.display = "flex";
          dropZone.style.display = "none";
        }
      }

      removeFile.addEventListener("click", () => {
        fileInput.value = "";
        fileInfo.style.display = "none";
        dropZone.style.display = "block";
      });

      uploadForm.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!fileInput.files.length) {
          alert("Silakan pilih file terlebih dahulu.");
          return;
        }
        alert("Berhasil! File Anda telah diunggah dan sedang menunggu moderasi Admin.");
        uploadForm.reset();
        fileInfo.style.display = "none";
        dropZone.style.display = "block";
        visCards.forEach((c) => c.classList.remove("active"));
        document.getElementById("visPublic").classList.add("active");
      });
    </script>
  </body>
</html>

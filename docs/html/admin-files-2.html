<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Berkas - ArsipKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --brand-primary: #6d28d9;
        --brand-primary-hover: #5b21b6;
        --brand-light: #f5f3ff;
        --brand-soft: #ede9fe;
        --bg-body: #f8fafc;
        --sidebar-width: 260px;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-body);
        color: #1e293b;
      }

      .sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        background: #ffffff;
        border-right: 1px solid #e2e8f0;
        z-index: 1000;
      }

      .sidebar-header {
        padding: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .logo-box {
        width: 40px;
        height: 40px;
        background: var(--brand-primary);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .sidebar-nav {
        padding: 1rem;
      }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        color: #64748b;
        text-decoration: none;
        border-radius: 10px;
        margin-bottom: 0.25rem;
        font-weight: 500;
      }
      .nav-link:hover,
      .nav-link.active {
        background: var(--brand-soft);
        color: var(--brand-primary);
      }
      .nav-section-title {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        font-weight: 700;
        margin: 1.5rem 1rem 0.5rem;
      }

      .main-content {
        margin-left: var(--sidebar-width);
        padding: 2rem;
      }

      .table-container {
        background: white;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        overflow: hidden;
      }
      .table thead th {
        background: #f8fafc;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #64748b;
        padding: 1rem 1.5rem;
        border: none;
      }
      .table tbody td {
        padding: 1rem 1.5rem;
        vertical-align: middle;
        border-bottom: 1px solid #f1f5f9;
      }

      .badge-status {
        padding: 0.35rem 0.75rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .badge-pending {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-valid {
        background: #d1fae5;
        color: #065f46;
      }
      .badge-suspended {
        background: #fee2e2;
        color: #991b1b;
      }

      .btn-action {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #e2e8f0;
        background: white;
        color: #64748b;
        transition: all 0.2s;
      }
      .btn-action:hover {
        border-color: var(--brand-primary);
        color: var(--brand-primary);
      }

      /* Modal Styles */
      .modal-content {
        border-radius: 20px;
        border: none;
      }
      .modal-header {
        border-bottom: 1px solid #f1f5f9;
        padding: 1.5rem;
      }
      .modal-body {
        padding: 1.5rem;
      }
      .form-label {
        font-weight: 600;
        font-size: 0.875rem;
        color: #475569;
      }
      .form-control,
      .form-select {
        border-radius: 10px;
        padding: 0.6rem 1rem;
        border: 1px solid #e2e8f0;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo-box"><i data-lucide="file-up"></i></div>
        <h4 class="mb-0 fw-bold">ArsipKu</h4>
      </div>
      <div class="sidebar-nav">
        <a href="index.html" class="nav-link"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        <a href="admin-files.html" class="nav-link active"><i data-lucide="file-check"></i><span>Semua Berkas</span></a>
        <a href="admin-uploaders.html" class="nav-link"><i data-lucide="users"></i><span>Uploader</span></a>
        <a href="leaderboard.html" class="nav-link"><i data-lucide="award"></i><span>Leaderboard</span></a>
        <div class="nav-section-title">Sistem</div>
        <a href="admin-links.html" class="nav-link"><i data-lucide="link"></i><span>Link Upload</span></a>
        <a href="settings.html" class="nav-link"><i data-lucide="settings"></i><span>Pengaturan</span></a>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Manajemen Berkas</h2>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" style="width: 150px">
            <option>Semua Status</option>
            <option>Pending</option>
            <option>Valid</option>
            <option>Suspended</option>
          </select>
          <input type="text" class="form-control form-control-sm" placeholder="Cari berkas..." style="width: 200px" />
        </div>
      </div>

      <div class="table-container">
        <div class="table-responsive">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>Berkas</th>
                <th>Uploader</th>
                <th>Visibilitas</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>
                  <div class="d-flex align-items-center gap-3">
                    <div class="bg-light rounded p-2 text-muted fw-bold small">PDF</div>
                    <div>
                      <p class="mb-0 fw-semibold small">Laporan Keuangan Q1</p>
                      <p class="mb-0 text-muted" style="font-size: 0.7rem">1.2 MB</p>
                    </div>
                  </div>
                </td>
                <td><span class="small">Budi Santoso</span><br /><span class="text-muted" style="font-size: 0.7rem">08123456789</span></td>
                <td><span class="small">Public</span></td>
                <td><span class="badge-status badge-pending">Pending</span></td>
                <td>
                  <div class="d-flex gap-2">
                    <a href="admin-edit-metadata.html" class="btn-action" title="Review"><i data-lucide="eye" style="width: 16px"></i></a>
                    <button class="btn-action" title="Download"><i data-lucide="download" style="width: 16px"></i></button>
                  </div>
                </td>
              </tr>
              <!-- More rows... -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Review & Metadata Berkas</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="row g-3">
                <div class="col-md-12">
                  <label class="form-label">Judul Berkas Final</label>
                  <input type="text" class="form-control" value="Laporan Keuangan Q1 2024" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Kategori</label>
                  <select class="form-select">
                    <option>Keuangan</option>
                    <option>Pendidikan</option>
                    <option>Teknologi</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Tipe File Final</label>
                  <input type="text" class="form-control" value="PDF" />
                </div>
                <div class="col-md-12">
                  <label class="form-label">Tag (Pisahkan dengan koma)</label>
                  <input type="text" class="form-control" placeholder="laporan, keuangan, 2024" />
                </div>
                <div class="col-md-12">
                  <label class="form-label">Deskripsi Singkat</label>
                  <textarea class="form-control" rows="3"></textarea>
                </div>
                <div class="col-md-12">
                  <label class="form-label">Status Akhir</label>
                  <div class="d-flex gap-3 mt-1">
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="status" id="statusValid" checked />
                      <label class="form-check-label text-success fw-bold" for="statusValid">Valid</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="status" id="statusPending" />
                      <label class="form-check-label text-warning fw-bold" for="statusPending">Pending</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="status" id="statusSuspended" />
                      <label class="form-check-label text-danger fw-bold" for="statusSuspended">Suspended</label>
                    </div>
                  </div>
                </div>
              </div>
              <div class="mt-4 d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">Batal</button>
                <button type="submit" class="btn btn-primary fw-bold px-4" style="background: var(--brand-primary)">Simpan Perubahan</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengaturan - ArsipKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --brand-primary: #6d28d9;
        --brand-primary-hover: #5b21b6;
        --brand-soft: #ede9fe;
        --bg-body: #f8fafc;
        --sidebar-width: 260px;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-body);
        color: #1e293b;
      }
      .sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        background: #ffffff;
        border-right: 1px solid #e2e8f0;
        z-index: 1000;
      }
      .sidebar-header {
        padding: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .logo-box {
        width: 40px;
        height: 40px;
        background: var(--brand-primary);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .sidebar-nav {
        padding: 1rem;
      }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        color: #64748b;
        text-decoration: none;
        border-radius: 10px;
        margin-bottom: 0.25rem;
        font-weight: 500;
      }
      .nav-link:hover,
      .nav-link.active {
        background: var(--brand-soft);
        color: var(--brand-primary);
      }
      .main-content {
        margin-left: var(--sidebar-width);
        padding: 2rem;
      }

      .settings-card {
        background: white;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
        padding: 2rem;
        margin-bottom: 2rem;
      }
      .form-label {
        font-weight: 600;
        font-size: 0.875rem;
        color: #475569;
      }
      .form-control {
        border-radius: 10px;
        padding: 0.75rem 1rem;
        border: 1px solid #e2e8f0;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo-box"><i data-lucide="file-up"></i></div>
        <h4 class="mb-0 fw-bold">ArsipKu</h4>
      </div>
      <div class="sidebar-nav">
        <a href="index.html" class="nav-link"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        <a href="admin-files.html" class="nav-link"><i data-lucide="file-check"></i><span>Semua Berkas</span></a>
        <a href="admin-uploaders.html" class="nav-link"><i data-lucide="users"></i><span>Uploader</span></a>
        <a href="leaderboard.html" class="nav-link"><i data-lucide="award"></i><span>Leaderboard</span></a>
        <div class="nav-section-title">Sistem</div>
        <a href="admin-links.html" class="nav-link"><i data-lucide="link"></i><span>Link Upload</span></a>
        <a href="settings.html" class="nav-link active"><i data-lucide="settings"></i><span>Pengaturan</span></a>
      </div>
    </div>

    <div class="main-content">
      <h2 class="fw-bold mb-4">Pengaturan Sistem</h2>

      <div class="row">
        <div class="col-12 col-lg-8">
          <div class="settings-card">
            <h5 class="fw-bold mb-4">Konfigurasi Aplikasi</h5>
            <form>
              <div class="mb-3">
                <label class="form-label">Nama Instansi / Aplikasi</label>
                <input type="text" class="form-control" value="ArsipKu - Sistem Arsip Berkas" />
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">Maksimal Ukuran File (MB)</label>
                  <input type="number" class="form-control" value="10" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Ekstensi Diizinkan</label>
                  <input type="text" class="form-control" value="pdf, jpg, png, docx, zip" />
                </div>
              </div>
              <div class="mb-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="autoApprove" checked />
                  <label class="form-check-label fw-medium" for="autoApprove">Aktifkan Katalog Publik</label>
                </div>
                <p class="text-muted small mt-1">Jika dimatikan, pengunjung tidak bisa melihat katalog berkas publik.</p>
              </div>
              <button type="submit" class="btn btn-primary fw-bold px-4 rounded-pill" style="background: var(--brand-primary); border: none">Simpan Perubahan</button>
            </form>
          </div>

          <div class="settings-card">
            <h5 class="fw-bold mb-4 text-danger">Keamanan Akun Admin</h5>
            <form>
              <div class="mb-3">
                <label class="form-label">Password Saat Ini</label>
                <input type="password" class="form-control" placeholder="••••••••" />
              </div>
              <div class="mb-3">
                <label class="form-label">Password Baru</label>
                <input type="password" class="form-control" />
              </div>
              <div class="mb-4">
                <label class="form-label">Konfirmasi Password Baru</label>
                <input type="password" class="form-control" />
              </div>
              <button type="submit" class="btn btn-danger fw-bold px-4 rounded-pill border-0">Ganti Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Link Upload - ArsipKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --brand-primary: #6d28d9;
        --brand-primary-hover: #5b21b6;
        --brand-soft: #ede9fe;
        --bg-body: #f8fafc;
        --sidebar-width: 260px;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-body);
        color: #1e293b;
      }
      .sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        background: #ffffff;
        border-right: 1px solid #e2e8f0;
        z-index: 1000;
      }
      .sidebar-header {
        padding: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .logo-box {
        width: 40px;
        height: 40px;
        background: var(--brand-primary);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .sidebar-nav {
        padding: 1rem;
      }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        color: #64748b;
        text-decoration: none;
        border-radius: 10px;
        margin-bottom: 0.25rem;
        font-weight: 500;
      }
      .nav-link:hover,
      .nav-link.active {
        background: var(--brand-soft);
        color: var(--brand-primary);
      }
      .main-content {
        margin-left: var(--sidebar-width);
        padding: 2rem;
      }

      .link-card {
        background: white;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .link-code {
        font-family: monospace;
        background: #f1f5f9;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-weight: 700;
        color: var(--brand-primary);
      }
      .status-pill {
        padding: 0.25rem 0.75rem;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 700;
      }
      .status-active {
        background: #d1fae5;
        color: #065f46;
      }
      .status-inactive {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo-box"><i data-lucide="file-up"></i></div>
        <h4 class="mb-0 fw-bold">ArsipKu</h4>
      </div>
      <div class="sidebar-nav">
        <a href="index.html" class="nav-link"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        <a href="admin-files.html" class="nav-link"><i data-lucide="file-check"></i><span>Semua Berkas</span></a>
        <a href="admin-uploaders.html" class="nav-link"><i data-lucide="users"></i><span>Uploader</span></a>
        <a href="leaderboard.html" class="nav-link"><i data-lucide="award"></i><span>Leaderboard</span></a>
        <div class="nav-section-title">Sistem</div>
        <a href="admin-links.html" class="nav-link active"><i data-lucide="link"></i><span>Link Upload</span></a>
        <a href="settings.html" class="nav-link"><i data-lucide="settings"></i><span>Pengaturan</span></a>
      </div>
    </div>

    <div class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Manajemen Link Upload</h2>
        <button
          class="btn btn-primary fw-bold px-4"
          style="background: var(--brand-primary); border: none; border-radius: 10px"
          data-bs-toggle="modal"
          data-bs-target="#createLinkModal"
        >
          Buat Link Baru
        </button>
      </div>

      <div class="row">
        <div class="col-12 col-lg-6">
          <div class="link-card">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <h5 class="fw-bold mb-1">Link Pendaftaran Q1</h5>
                <span class="status-pill status-active">Aktif</span>
              </div>
              <button class="btn btn-sm btn-light"><i data-lucide="more-horizontal" style="width: 18px"></i></button>
            </div>
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="link-code">arsipku.com/u/TOKEN123</span>
              <button class="btn btn-sm btn-outline-secondary p-1" title="Salin Link"><i data-lucide="copy" style="width: 16px"></i></button>
            </div>
            <div class="row g-2 text-muted small">
              <div class="col-6"><i data-lucide="calendar" style="width: 14px"></i> Exp: 30 Apr 2024</div>
              <div class="col-6"><i data-lucide="file-up" style="width: 14px"></i> Digunakan: 42/100</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Create Link Modal -->
    <div class="modal fade" id="createLinkModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px">
          <div class="modal-header border-0 p-4 pb-0">
            <h5 class="modal-title fw-bold">Buat Link Upload Baru</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">
            <form>
              <div class="mb-3">
                <label class="form-label fw-bold small">Judul / Catatan Internal</label>
                <input type="text" class="form-control" placeholder="Contoh: Link Upload Event IT" style="border-radius: 10px" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold small">Batas Penggunaan (0 untuk tak terbatas)</label>
                <input type="number" class="form-control" value="0" style="border-radius: 10px" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold small">Tanggal Kedaluwarsa</label>
                <input type="date" class="form-control" style="border-radius: 10px" />
              </div>
              <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-3" style="background: var(--brand-primary); border: none; border-radius: 10px">
                Generate Link
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
